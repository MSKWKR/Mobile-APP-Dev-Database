services:

  tor-americas:
    image: dperson/torproxy
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.21

  tor-europe:
    image: dperson/torproxy
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.22

  tor-asia-pacific:
    image: dperson/torproxy
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.23

  tor-africa-me:
    image: dperson/torproxy
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.24

  crawler-americas:
    build: .
    environment:
      - COUNTRIES_FILE=listings/countries-americas.json
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=appcrawler
      - DB_USER=crawler
      - DB_PASS=crawlerpass
      - PYTHONUNBUFFERED=1
      - PROXY_HOST=tor-americas
      - PROXY_PORT=8118
    depends_on:
      db:
        condition: service_healthy
      tor-americas:
        condition: service_started
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.11

  crawler-europe:
    build: .
    environment:
      - COUNTRIES_FILE=listings/countries-europe.json
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=appcrawler
      - DB_USER=crawler
      - DB_PASS=crawlerpass
      - PYTHONUNBUFFERED=1
      - PROXY_HOST=tor-europe
      - PROXY_PORT=8118
    depends_on:
      db:
        condition: service_healthy
      tor-europe:
        condition: service_started
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.12

  crawler-asia-pacific:
    build: .
    environment:
      - COUNTRIES_FILE=listings/countries-asia_pacific.json
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=appcrawler
      - DB_USER=crawler
      - DB_PASS=crawlerpass
      - PYTHONUNBUFFERED=1
      - PROXY_HOST=tor-asia-pacific
      - PROXY_PORT=8118
    depends_on:
      db:
        condition: service_healthy
      tor-asia-pacific:
        condition: service_started
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.13

  crawler-africa-me:
    build: .
    environment:
      - COUNTRIES_FILE=listings/countries-africa_middle_east.json
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=appcrawler
      - DB_USER=crawler
      - DB_PASS=crawlerpass
      - PYTHONUNBUFFERED=1
      - PROXY_HOST=tor-africa-me
      - PROXY_PORT=8118
    depends_on:
      db:
        condition: service_healthy
      tor-africa-me:
        condition: service_started
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.14

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: appcrawler
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawlerpass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      crawler_net:
        ipv4_address: 172.28.0.10
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=512MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler -d appcrawler"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  crawler_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  pgdata: