services:

  # ──────────────────────────────────────────────
  # App Store crawlers
  # ──────────────────────────────────────────────

  crawler-appstore-americas:
    build: .
    container_name: crawler-appstore-americas
    environment:
      - COUNTRIES_FILE=listings/countries-americas.json
      - CRAWLER=app_store
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      crawler_net:
        ipv4_address: 172.28.0.11

  crawler-appstore-europe:
    build: .
    container_name: crawler-appstore-europe
    environment:
      - COUNTRIES_FILE=listings/countries-europe.json
      - CRAWLER=app_store
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      crawler_net:
        ipv4_address: 172.28.0.12

  crawler-appstore-asia-pacific:
    build: .
    container_name: crawler-appstore-asia_pacific
    environment:
      - COUNTRIES_FILE=listings/countries-asia_pacific.json
      - CRAWLER=app_store
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      crawler_net:
        ipv4_address: 172.28.0.13

  crawler-appstore-africa-me:
    build: .
    container_name: crawler-appstore-africa-middle_east
    environment:
      - COUNTRIES_FILE=listings/countries-africa_middle_east.json
      - CRAWLER=app_store
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      crawler_net:
        ipv4_address: 172.28.0.14

  # ──────────────────────────────────────────────
  # Google Play crawlers
  # ──────────────────────────────────────────────

  crawler-gplay-americas:
    build: .
    container_name: crawler-gplay-americas
    environment:
      - COUNTRIES_FILE=listings/countries-americas.json
      - CRAWLER=google_play
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      crawler_net:
        ipv4_address: 172.28.0.21

  crawler-gplay-europe:
    build: .
    container_name: crawler-gplay-europe
    environment:
      - COUNTRIES_FILE=listings/countries-europe.json
      - CRAWLER=google_play
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      crawler_net:
        ipv4_address: 172.28.0.22

  crawler-gplay-asia-pacific:
    build: .
    container_name: crawler-gplay-asia_pacific
    environment:
      - COUNTRIES_FILE=listings/countries-asia_pacific.json
      - CRAWLER=google_play
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      crawler_net:
        ipv4_address: 172.28.0.23

  crawler-gplay-africa-me:
    build: .
    container_name: crawler-gplay-africa-middle_east
    environment:
      - COUNTRIES_FILE=listings/countries-africa_middle_east.json
      - CRAWLER=google_play
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      crawler_net:
        ipv4_address: 172.28.0.24

  # ──────────────────────────────────────────────
  # Database
  # ──────────────────────────────────────────────

  db:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_DB: appcrawler
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawlerpass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      crawler_net:
        ipv4_address: 172.28.0.10
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=512MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler -d appcrawler"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  crawler_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  pgdata: