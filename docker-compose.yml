services:

  # ── Tor proxies — App Store ──────────────────
  tor-as-americas:
    image: dperson/torproxy
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.21

  tor-as-europe:
    image: dperson/torproxy
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.22

  tor-as-asia-pacific:
    image: dperson/torproxy
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.23

  tor-as-africa-me:
    image: dperson/torproxy
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.24

  # ── Tor proxies — Google Play ────────────────
  tor-gp-americas:
    image: dperson/torproxy
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.25

  tor-gp-europe:
    image: dperson/torproxy
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.26

  tor-gp-asia-pacific:
    image: dperson/torproxy
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.27

  tor-gp-africa-me:
    image: dperson/torproxy
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.28

  # ── App Store crawlers ───────────────────────
  as-americas:
    build: .
    environment:
      - CRAWLER_TYPE=app_store
      - COUNTRIES_FILE=listings/countries-americas.json
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=appcrawler
      - DB_USER=crawler
      - DB_PASS=crawlerpass
      - PYTHONUNBUFFERED=1
      - PROXY_HOST=tor-as-americas
      - PROXY_PORT=8118
    depends_on:
      db:
        condition: service_healthy
      tor-as-americas:
        condition: service_started
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.11

  as-europe:
    build: .
    environment:
      - CRAWLER_TYPE=app_store
      - COUNTRIES_FILE=listings/countries-europe.json
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=appcrawler
      - DB_USER=crawler
      - DB_PASS=crawlerpass
      - PYTHONUNBUFFERED=1
      - PROXY_HOST=tor-as-europe
      - PROXY_PORT=8118
    depends_on:
      db:
        condition: service_healthy
      tor-as-europe:
        condition: service_started
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.12

  as-asia-pacific:
    build: .
    environment:
      - CRAWLER_TYPE=app_store
      - COUNTRIES_FILE=listings/countries-asia_pacific.json
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=appcrawler
      - DB_USER=crawler
      - DB_PASS=crawlerpass
      - PYTHONUNBUFFERED=1
      - PROXY_HOST=tor-as-asia-pacific
      - PROXY_PORT=8118
    depends_on:
      db:
        condition: service_healthy
      tor-as-asia-pacific:
        condition: service_started
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.13

  as-africa-me:
    build: .
    environment:
      - CRAWLER_TYPE=app_store
      - COUNTRIES_FILE=listings/countries-africa_middle_east.json
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=appcrawler
      - DB_USER=crawler
      - DB_PASS=crawlerpass
      - PYTHONUNBUFFERED=1
      - PROXY_HOST=tor-as-africa-me
      - PROXY_PORT=8118
    depends_on:
      db:
        condition: service_healthy
      tor-as-africa-me:
        condition: service_started
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.14

  # ── Google Play crawlers ─────────────────────
  gp-americas:
    build: .
    environment:
      - CRAWLER_TYPE=google_play
      - COUNTRIES_FILE=listings/countries-americas.json
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=appcrawler
      - DB_USER=crawler
      - DB_PASS=crawlerpass
      - PYTHONUNBUFFERED=1
      - PROXY_HOST=tor-gp-americas
      - PROXY_PORT=8118
    depends_on:
      db:
        condition: service_healthy
      tor-gp-americas:
        condition: service_started
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.15

  gp-europe:
    build: .
    environment:
      - CRAWLER_TYPE=google_play
      - COUNTRIES_FILE=listings/countries-europe.json
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=appcrawler
      - DB_USER=crawler
      - DB_PASS=crawlerpass
      - PYTHONUNBUFFERED=1
      - PROXY_HOST=tor-gp-europe
      - PROXY_PORT=8118
    depends_on:
      db:
        condition: service_healthy
      tor-gp-europe:
        condition: service_started
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.16

  gp-asia-pacific:
    build: .
    environment:
      - CRAWLER_TYPE=google_play
      - COUNTRIES_FILE=listings/countries-asia_pacific.json
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=appcrawler
      - DB_USER=crawler
      - DB_PASS=crawlerpass
      - PYTHONUNBUFFERED=1
      - PROXY_HOST=tor-gp-asia-pacific
      - PROXY_PORT=8118
    depends_on:
      db:
        condition: service_healthy
      tor-gp-asia-pacific:
        condition: service_started
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.17

  gp-africa-me:
    build: .
    environment:
      - CRAWLER_TYPE=google_play
      - COUNTRIES_FILE=listings/countries-africa_middle_east.json
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=appcrawler
      - DB_USER=crawler
      - DB_PASS=crawlerpass
      - PYTHONUNBUFFERED=1
      - PROXY_HOST=tor-gp-africa-me
      - PROXY_PORT=8118
    depends_on:
      db:
        condition: service_healthy
      tor-gp-africa-me:
        condition: service_started
    restart: unless-stopped
    networks:
      crawler_net:
        ipv4_address: 172.28.0.18

  # ── Database ─────────────────────────────────
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: appcrawler
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawlerpass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      crawler_net:
        ipv4_address: 172.28.0.10
    command: >
      postgres
        -c max_connections=500
        -c shared_buffers=512MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler -d appcrawler"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  crawler_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  pgdata: